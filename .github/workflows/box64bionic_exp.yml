name: Box64 Bionic Experimental

on:
  workflow_dispatch:
    inputs:
      host:
        type: boolean
        default: false
        description: "Self-hosted"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GH_TOKEN: ${{ github.token }}
  UPSTREAM_OWNER: ptitSeb
  UPSTREAM_REPO: box64
  RELEASE_TAG: BOX64-BIONIC-EXPERIMENTAL
  NDK_VER: r26b
  API_LEVEL: 31

defaults:
  run:
    shell: 'bash --noprofile --norc -Eeuo pipefail {0}'

jobs:
  build:
    name: Build Experimental (Tier1 + Tier2)
    runs-on: ${{ inputs.host == true && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get -yqq update
          sudo apt-get -yqq install --no-install-recommends \
            curl unzip ca-certificates \
            ninja-build cmake zstd file binutils

      - name: Resolve Latest Tag
        id: resolve
        run: |
          echo "Fetching releases from ${UPSTREAM_OWNER}/${UPSTREAM_REPO}..."
          LATEST_REF=$(gh api "repos/${UPSTREAM_OWNER}/${UPSTREAM_REPO}/releases?per_page=50" --jq '
            [ .[] | select(.draft==false and .prerelease==false) | .tag_name | select(test("^v[0-9]+\\.[0-9]+\\.[0-9]+$")) ]
            | sort_by(sub("^v";"") | split(".") | map(tonumber)) | last
          ')

          [[ -z "$LATEST_REF" ]] && { echo "::error::No tag found"; exit 1; }

          VERSION="${LATEST_REF#v}"
          echo "Resolved: $LATEST_REF ($VERSION)"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "ref=$LATEST_REF" >> "$GITHUB_OUTPUT"

      - name: Checkout Upstream
        uses: actions/checkout@v4
        with:
          repository: ${{ env.UPSTREAM_OWNER }}/${{ env.UPSTREAM_REPO }}
          ref: ${{ steps.resolve.outputs.ref }}
          submodules: recursive
          path: src
          fetch-depth: 1

      - name: Setup Android NDK
        run: |
          rm -rf "android-ndk-${NDK_VER}"
          curl -fsSL "https://dl.google.com/android/repository/android-ndk-${NDK_VER}-linux.zip" -o ndk.zip
          unzip -q ndk.zip && rm ndk.zip

      - name: Configure & Build & Package
        env:
          VERSION: ${{ steps.resolve.outputs.version }}
        run: |
          # Clean previous artifacts on self-hosted
          rm -rf artifacts build-t1 build-t2 pkg-t1 pkg-t2
          mkdir -p artifacts

          # Setup Environment
          export NDK_HOME="$PWD/android-ndk-${NDK_VER}"
          TOOLCHAIN="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"

          # Flag Definitions
          # Common flags (no -O level here; let CMake decide: ANDROID → -O1)
          BASE_EXTRA="-pipe -fomit-frame-pointer -fno-plt -fno-semantic-interposition -fno-strict-aliasing -ffunction-sections -fdata-sections"
          BASE_LD="-fuse-ld=lld -Wl,-O3 -Wl,--gc-sections"

          # Tier Specific Flags
          FLAGS_T1="-march=armv9-a+crypto+crc+lse+fp16"
          FLAGS_T2="-march=armv9.2-a+crypto+crc+lse+fp16+sve2+rcpc+i8mm+bf16"

          # Helper Function: Build & Package
          process_tier() {
            local ID=$1        # t1 or t2
            local ARCH_FLAG=$2 # Specific march flags

            echo "::group::Processing Tier $ID ($ARCH_FLAG)"
            
            # Build
            local BUILD_DIR="build-$ID"
            local PKG_DIR="pkg-$ID"
            local FILENAME="box64-bionic-${VERSION}-${ID}.wcp"
            local EXTRA_FLAGS="${ARCH_FLAG} ${BASE_EXTRA}"
            
            cmake -S src -B "$BUILD_DIR" -G Ninja \
              -DCMAKE_C_COMPILER="${TOOLCHAIN}/aarch64-linux-android${API_LEVEL}-clang" \
              -DCMAKE_CXX_COMPILER="${TOOLCHAIN}/aarch64-linux-android${API_LEVEL}-clang++" \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_C_FLAGS="${EXTRA_FLAGS}" \
              -DCMAKE_CXX_FLAGS="${EXTRA_FLAGS}" \
              -DCMAKE_EXE_LINKER_FLAGS_RELEASE="${BASE_LD}" \
              -DANDROID=1 -DARM_DYNAREC=1 -DBAD_SIGNAL=1 \
              -DTERMUX=0 -DHAVE_TRACE=0 -DZYDIS3=0 -DBOX32=0 -DCI=0 -DSTATICBUILD=0

            cmake --build "$BUILD_DIR" --parallel "$(nproc)"
            "${TOOLCHAIN}/llvm-strip" --strip-unneeded "$BUILD_DIR/box64"

            # Verify
            if ! readelf -d "$BUILD_DIR/box64" | grep -q "NEEDED.*libc.so"; then
              echo "::error::Tier $ID linking failed (libc not found)"
              exit 1
            fi

            # Package
            mkdir -p "$PKG_DIR"
            cp "$BUILD_DIR/box64" "$PKG_DIR/box64"
            chmod +x "$PKG_DIR/box64"

            cat > "$PKG_DIR/profile.json" <<EOF
          {
            "type": "Box64",
            "versionName": "${VERSION}-${ID}",
            "versionCode": 0,
            "description": "Built on the Winlator WCP Hub (Upstream: ptitSeb)",
            "files": [{ "source": "box64", "target": "\${bindir}/box64" }]
          }
          EOF

            tar --zstd --owner=0 --group=0 --sort=name -cf "artifacts/$FILENAME" -C "$PKG_DIR" profile.json box64
            echo "Created: artifacts/$FILENAME"
            echo "::endgroup::"
          }

          # Execution
          process_tier "t1" "$FLAGS_T1"
          process_tier "t2" "$FLAGS_T2"

      - name: Release
        run: |
          cat > release_notes.md <<EOF
          - **Tier 1**: SD 8 Gen 1-3, Dimensity 9000-9300, Exynos 2200/2400 (ARMv9+LSE)
          - **Tier 2**: SD 8 Elite, Dimensity 9400 (ARMv9.2+SVE2+RCPC)
          - *Experimental build with aggressive optimization flags. (Just for fun)*
          EOF

          # Create or Edit Release
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" \
              --title "Box64 Bionic Experimental" --notes-file release_notes.md
          else
            gh release create "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" \
              --title "Box64 Bionic Experimental" --notes-file release_notes.md
          fi

          # Upload
          gh release upload "$RELEASE_TAG" artifacts/*.wcp --repo "$GITHUB_REPOSITORY" --clobber
