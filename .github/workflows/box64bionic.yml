name: Box64 Bionic Stable + Nightly

on:
  workflow_dispatch:
    inputs:
      channel:
        type: choice
        description: "Build channel"
        options: [stable, nightly]
        default: stable
      host:
        type: boolean
        default: false
        description: "Self-hosted"
      version:
        type: string
        description: "Stable tag (e.g. v0.3.8). Empty = latest"
  schedule:
    - cron: "0 17 * * *"   # Daily Stable Check
    - cron: "30 17 * * *"  # Daily Nightly Check

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GH_TOKEN: ${{ github.token }}
  UPSTREAM_SLUG: ptitSeb/box64
  REL_TAG_STABLE: BOX64-BIONIC
  REL_TAG_NIGHTLY: BOX64-BIONIC-NIGHTLY
  NDK_VER: r26b
  API_LEVEL: 31

defaults:
  run:
    shell: 'bash --noprofile --norc -Eeuo pipefail {0}'

jobs:
  guard:
    name: Check Upstream
    runs-on: ${{ inputs.host == true && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 5
    outputs:
      build:     ${{ steps.check.outputs.build }}
      ref:       ${{ steps.check.outputs.ref }}
      filename:  ${{ steps.check.outputs.filename }}
      ver_name:  ${{ steps.check.outputs.ver_name }}
      ver_code:  ${{ steps.check.outputs.ver_code }}
      rel_tag:   ${{ steps.check.outputs.rel_tag }}
      rel_title: ${{ steps.check.outputs.rel_title }}
      notes:     ${{ steps.check.outputs.notes }}
    steps:
      - name: Resolve metadata & check existence
        id: check
        env:
          IN_CHANNEL: ${{ inputs.channel }}
          IN_VERSION: ${{ inputs.version }}
          IS_SCHEDULE: ${{ github.event_name == 'schedule' }}
          SCHEDULE_CRON: ${{ github.event.schedule }}
        run: |
          set -e
          
          # 1. Determine Channel
          CHANNEL="${IN_CHANNEL:-stable}"
          if [[ "$IS_SCHEDULE" == "true" ]]; then
            # 17:30 schedule triggers Nightly
            [[ "$SCHEDULE_CRON" == "30 17 * * *" ]] && CHANNEL="nightly" || CHANNEL="stable"
          fi
          echo "Selected channel: $CHANNEL"

          get_latest_ver() {
            gh api "repos/$UPSTREAM_SLUG/releases?per_page=50" --jq '[.[]|select(.draft==false and .prerelease==false)|.tag_name|select(test("^v[0-9]+\\."))]|sort_by(sub("^v";"")|split(".")|map(tonumber))|last'
          }

          # 2. Calculate Variables
          if [[ "$CHANNEL" == "stable" ]]; then
            # Stable Logic
            REF="${IN_VERSION:-$(get_latest_ver)}"
            [[ -z "$REF" || "$REF" == "null" ]] && exit 1
            
            VER_NAME="${REF#v}"
            VER_CODE="0"
            REL_TAG="$REL_TAG_STABLE"
            REL_TITLE="BOX64-BIONIC"
            NOTES="Current version: ${VER_NAME}"
            FILENAME="box64-bionic-${VER_NAME}.wcp"

          else 
            # Nightly Logic
            REF=$(gh api "repos/$UPSTREAM_SLUG/commits/HEAD" --jq .sha)
            SHORT="${REF:0:7}"
            DATECODE=$(date -u +%y%m%d)
            
            LATEST_TAG=$(get_latest_ver)
            IFS='.' read -r M m p <<< "${LATEST_TAG#v}"
            DEV_VER="${M}.${m}.$((p+1))"
            
            DIST_VER="${DEV_VER}-${DATECODE}-${SHORT}"
            
            # JSON metadata uses clean version
            VER_NAME="${DEV_VER}"
            VER_CODE="${DATECODE}"
            
            REL_TAG="$REL_TAG_NIGHTLY"
            REL_TITLE="BOX64-BIONIC-NIGHTLY"
            NOTES="Current version: ${DIST_VER}-[${SHORT}](https://github.com/${UPSTREAM_SLUG}/commit/${REF})"
            FILENAME="box64-bionic-${DIST_VER}.wcp"
          fi

          # 3. Check Existence (Smart Skip)
          ASSETS=$(gh release view "$REL_TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' 2>/dev/null || true)

          if [[ "$CHANNEL" == "stable" ]]; then
            # Stable: Exact match
            if echo "$ASSETS" | grep -qx "$FILENAME"; then
              echo "::notice::Stable version $VER_NAME already exists. Skipping."
              BUILD="false"
            else
              BUILD="true"
            fi
          else
            # Nightly: Check exact file OR same commit hash
            if echo "$ASSETS" | grep -qx "$FILENAME"; then
              echo "::notice::Asset $FILENAME already exists (Same day re-run). Skipping."
              BUILD="false"
            elif echo "$ASSETS" | grep -q "\-${SHORT}\.wcp$"; then
              echo "::notice::Commit $SHORT has already been built previously. Skipping."
              BUILD="false"
            else
              BUILD="true"
            fi
          fi

          # 4. Set Outputs
          {
            echo "build=${BUILD}"
            echo "ref=${REF}"
            echo "filename=${FILENAME}"
            echo "ver_name=${VER_NAME}"
            echo "ver_code=${VER_CODE}"
            echo "rel_tag=${REL_TAG}"
            echo "rel_title=${REL_TITLE}"
            echo "notes=${NOTES}"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ format('{0} ({1})', needs.guard.outputs.rel_title, needs.guard.outputs.ver_name) }}
    needs: guard
    if: needs.guard.outputs.build == 'true'
    runs-on: ${{ inputs.host == true && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 60
    permissions: { contents: write }
    env:
      REF:       ${{ needs.guard.outputs.ref }}
      FILENAME:  ${{ needs.guard.outputs.filename }}
      VER_NAME:  ${{ needs.guard.outputs.ver_name }}
      VER_CODE:  ${{ needs.guard.outputs.ver_code }}
      REL_TAG:   ${{ needs.guard.outputs.rel_tag }}
      REL_TITLE: ${{ needs.guard.outputs.rel_title }}
      NOTES_STR: ${{ needs.guard.outputs.notes }}
    steps:
      - name: Install Deps
        run: sudo apt-get -yqq update && sudo apt-get -yqq install --no-install-recommends ninja-build zstd curl unzip binutils

      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ env.UPSTREAM_SLUG }}
          ref: ${{ env.REF }}
          submodules: recursive
          path: src
          fetch-depth: 1

      - name: Setup NDK & Build
        run: |
          rm -rf build
          
          curl -fsSL "https://dl.google.com/android/repository/android-ndk-${NDK_VER}-linux.zip" -o ndk.zip
          unzip -q ndk.zip && rm ndk.zip
          export NDK_HOME="$PWD/android-ndk-${NDK_VER}"
          TC="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"

          cmake -S src -B build -G Ninja \
            -DCMAKE_C_COMPILER="${TC}/aarch64-linux-android${API_LEVEL}-clang" \
            -DCMAKE_CXX_COMPILER="${TC}/aarch64-linux-android${API_LEVEL}-clang++" \
            -DCMAKE_BUILD_TYPE=Release \
            -DANDROID=1 -DARM_DYNAREC=1 -DBAD_SIGNAL=1 \
            -DTERMUX=0 -DHAVE_TRACE=0 -DZYDIS3=0 -DBOX32=0 -DCI=0 -DSTATICBUILD=0
          
          cmake --build build --parallel "$(nproc)"
          "${TC}/llvm-strip" --strip-unneeded build/box64

      - name: Package & Release
        run: |
          readelf -d build/box64 | grep -q "NEEDED.*libc.so" || { echo "Linking failed"; exit 1; }

          mkdir -p pkg artifacts
          cp build/box64 pkg/box64 && chmod +x pkg/box64
          
          cat > pkg/profile.json <<EOF
          {
            "type": "Box64",
            "versionName": "${VER_NAME}",
            "versionCode": ${VER_CODE},
            "description": "Built on the Winlator WCP Hub (Upstream: ptitSeb)",
            "files": [{ "source": "box64", "target": "\${bindir}/box64" }]
          }
          EOF

          tar --zstd --owner=0 --group=0 --sort=name -cf "artifacts/${FILENAME}" -C pkg profile.json box64

          echo -e "- Target: AArch64/Android ${API_LEVEL}\n- ${NOTES_STR}" > release_notes.md
          
          echo "Updating Release: $REL_TAG"
          if gh release view "$REL_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$REL_TAG" --repo "$GITHUB_REPOSITORY" --title "$REL_TITLE" --notes-file release_notes.md
          else
            gh release create "$REL_TAG" --repo "$GITHUB_REPOSITORY" --title "$REL_TITLE" --notes-file release_notes.md
          fi
          
          gh release upload "$REL_TAG" "artifacts/${FILENAME}" --repo "$GITHUB_REPOSITORY" --clobber

      - name: Prune Old Assets
        env:
          KEEP: 10
        run: |
          # Only prune if this is the Nightly channel
          if [[ "$REL_TAG" != "$REL_TAG_NIGHTLY" ]]; then
            echo "Current release ($REL_TAG) is not Nightly. Skipping prune."
            exit 0
          fi

          echo "Checking for old assets in $REL_TAG (keeping latest $KEEP)..."
          
          TO_DELETE=$(gh release view "$REL_TAG" --repo "$GITHUB_REPOSITORY" --json assets \
            --jq ".assets
                  | sort_by(.createdAt)
                  | reverse
                  | .[\$KEEP:][]?.name" \
            --argjson KEEP "$KEEP" || true)

          if [[ -z "$TO_DELETE" ]]; then
            echo "No assets to prune."
            exit 0
          fi

          for asset in $TO_DELETE; do
            echo "Deleting old asset: $asset"
            gh release delete-asset "$REL_TAG" "$asset" --repo "$GITHUB_REPOSITORY" -y || echo "Failed to delete $asset"
          done
