name: VKD3D ARM64EC

on:
  workflow_dispatch:
    inputs:
      host:
        type: boolean
        default: false
        description: "Self-hosted"
      version:
        type: string
        description: "Single tag allowed (v3.0a) Empty = Latest"
  schedule:
    - cron: "0 17 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GH_TOKEN: ${{ github.token }}
  VKD3D_REPO: HansKristian-Work/vkd3d-proton
  REL_TAG: VKD3D-PROTON-ARM64EC
  LLVM_MINGW_TAG: ${{ vars.LLVM_MINGW_TAG || '20251118' }} # mstorsjo

defaults:
  run:
    shell: 'bash --noprofile --norc -Eeuo pipefail {0}'

jobs:
  guard:
    name: Check Update
    runs-on: ${{ inputs.host == true && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 5
    outputs:
      build:    ${{ steps.detect.outputs.missing }}
      to_build: ${{ steps.detect.outputs.list }}
    steps:
      - name: Detect Target Version
        id: detect
        env:
          IN_VERSION: ${{ inputs.version }}
          IS_SCHEDULE: ${{ github.event_name == 'schedule' }}
        run: |
          get_latest_tag() {
            gh api "repos/$VKD3D_REPO/tags?per_page=100" --jq '.[].name' \
              | grep -E '^v[0-9]+\.[0-9]+' \
              | sort -V \
              | tail -n 1
          }

          # 1. Resolve target tag (FEX-style: explicit or latest)
          if [[ "$IS_SCHEDULE" == "true" ]]; then
            TARGET_TAG="$(get_latest_tag)"
          else
            if [[ -n "$IN_VERSION" ]]; then
              TARGET_TAG="$IN_VERSION"
            else
              TARGET_TAG="$(get_latest_tag)"
            fi
          fi

          if [[ -z "$TARGET_TAG" ]]; then
            echo "::warning::Failed to resolve target tag."
            {
              echo "missing=false"
              echo "list="
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BASE="${TARGET_TAG#v}"
          FILENAME="vkd3d-proton-arm64ec-${BASE}.wcp"

          echo "Target tag:  $TARGET_TAG"
          echo "Base:        $BASE"
          echo "Artifact:    $FILENAME"

          # 2. Smart skip: check if this version is already built
          ASSETS="$(gh release view "$REL_TAG" --repo "$GITHUB_REPOSITORY" \
                      --json assets --jq '.assets[].name' 2>/dev/null || true)"

          if echo "$ASSETS" | grep -qx "$FILENAME"; then
            echo "::notice::Asset $FILENAME already exists on $REL_TAG. Skipping."
            {
              echo "missing=false"
              echo "list="
            } >> "$GITHUB_OUTPUT"
          else
            echo "Will build $TARGET_TAG"
            {
              echo "missing=true"
              echo "list<<EOF"
              echo "$TARGET_TAG $BASE"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build & Release
    needs: guard
    if: needs.guard.outputs.build == 'true'
    runs-on: ${{ inputs.host == true && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 60
    permissions: { contents: write }
    steps:
      - name: Install Deps
        run: |
          sudo apt-get -yqq update
          sudo apt-get -yqq install --no-install-recommends \
            curl xz-utils jq git zstd \
            ca-certificates python3-venv build-essential

      - name: Setup Build Env
        run: |
          rm -rf src VKD3D_WCP out .venv

          # 1. Python Venv (Meson/Ninja)
          python3 -m venv .venv
          .venv/bin/pip install "meson==1.2.3" "ninja==1.11.1"
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

          # 2. llvm-mingw
          gh release download "$LLVM_MINGW_TAG" -R mstorsjo/llvm-mingw \
            -p '*ucrt-ubuntu-22.04-x86_64.tar.xz' -O llvm.tar.xz --clobber
          sudo mkdir -p /opt/llvm-mingw
          sudo tar -C /opt/llvm-mingw --strip-components=1 -xJf llvm.tar.xz
          echo "/opt/llvm-mingw/bin" >> "$GITHUB_PATH"

      - name: Clone VKD3D
        run: |
          git clone --recurse-submodules "https://github.com/$VKD3D_REPO.git" src
          git -C src config user.name "Builder" && git -C src config user.email "bot@noreply"

      - name: Build Loop
        env:
          TO_BUILD: ${{ needs.guard.outputs.to_build }}
        run: |
          mkdir -p out
          cd src
          git fetch --tags --force

          while read -r tag base; do
            [[ -z "$tag" ]] && continue

            echo "::group::Building $tag (ARM64EC)"
            git reset --hard && git clean -fdx && git checkout -f "$tag"
            git submodule update --init --recursive

            # 1. Build x86 (32-bit)
            mkdir -p build.x86
            meson setup build.x86 --cross-file build-win32.txt \
              --buildtype release --prefix "$PWD/install/x86" --libdir bin
            ninja -C build.x86 install

            # 2. Build ARM64EC
            # Generate Crossfile dynamically
            cat > cross-arm64ec.txt <<EOF
            [binaries]
            c = 'arm64ec-w64-mingw32-gcc'
            cpp = 'arm64ec-w64-mingw32-g++'
            ar = 'arm64ec-w64-mingw32-ar'
            ld = 'arm64ec-w64-mingw32-ld'
            windres = 'arm64ec-w64-mingw32-windres'
            widl = 'arm64ec-w64-mingw32-widl'
            strip = 'llvm-strip'
            [host_machine]
            system = 'windows'
            cpu_family = 'aarch64'
            cpu = 'aarch64'
            endian = 'little'
          EOF

            mkdir -p build.ec
            meson setup build.ec --cross-file cross-arm64ec.txt \
              --buildtype release --prefix "$PWD/install/ec" --libdir bin
            ninja -C build.ec install

            # 3. Package Preparation
            WCP_DIR="../VKD3D_WCP"
            rm -rf "$WCP_DIR" && mkdir -p "$WCP_DIR/system32" "$WCP_DIR/syswow64"

            cp install/x86/bin/*.dll "$WCP_DIR/syswow64/"
            cp install/ec/bin/*.dll  "$WCP_DIR/system32/"
            
            # Strip
            find "$WCP_DIR" -name '*.dll' -print0 | xargs -0 -r llvm-strip -s

            # Verify
            if [[ -z $(ls -A "$WCP_DIR/system32") || -z $(ls -A "$WCP_DIR/syswow64") ]]; then
              echo "::error::Missing DLLs for $tag"
              exit 1
            fi

            # Generate Profile
            jq -n \
              --arg VER "arm64ec-$base" \
              --arg DESC "Built on the Winlator WCP Hub (Upstream: Hans-Kristian Arntzen)" \
              --slurpfile X64 <(ls "$WCP_DIR/system32" | jq -R '{source: ("system32/"+.), target: ("${system32}/"+.)}') \
              --slurpfile X86 <(ls "$WCP_DIR/syswow64" | jq -R '{source: ("syswow64/"+.), target: ("${syswow64}/"+.)}') \
              '{
                type: "VKD3D",
                versionName: $VER,
                versionCode: 0,
                description: $DESC,
                files: ($X64 + $X86)
              }' > "$WCP_DIR/profile.json"

            # Compress
            tar --zstd -C "$WCP_DIR" --format=gnu --owner=0 --group=0 --sort=name \
              -cf "../out/vkd3d-proton-arm64ec-${base}.wcp" profile.json system32 syswow64
            
            echo "::endgroup::"
          done <<< "$TO_BUILD"

      - name: Release
        env:
          REPO: ${{ github.repository }}
        run: |
          NOTES="RELEASE_NOTES.md"
          echo -e "- Architecture: ARM64EC (system32) + x86 (syswow64)" > "$NOTES"
          echo -e "- **Exclusive for FEX**" >> "$NOTES"
          
          if compgen -G "out/vkd3d-proton-arm64ec-*.wcp" > /dev/null; then
             LATEST=$(ls out/vkd3d-proton-arm64ec-*.wcp | sort -V | tail -n1 | sed -E 's/.*vkd3d-proton-arm64ec-(.*)\.wcp/\1/')
             echo "- Current version: $LATEST" >> "$NOTES"
             
             if ! gh release view "$REL_TAG" --repo "$REPO" >/dev/null 2>&1; then
               gh release create "$REL_TAG" --repo "$REPO" -t "$REL_TAG" -F "$NOTES"
             else
               gh release edit "$REL_TAG" --repo "$REPO" -t "$REL_TAG" -F "$NOTES"
             fi
             gh release upload "$REL_TAG" out/vkd3d-proton-arm64ec-*.wcp --repo "$REPO" --clobber
          else
             echo "No artifacts produced."
          fi
